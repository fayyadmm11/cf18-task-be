version: '3.8'

services:
  # Konfigurasi Database PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: siakng_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: siakng_lite
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - siakng_network

  # Konfigurasi Backend NestJS
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: siakng_backend
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     - postgres
  #   environment:
  #     # Terhubung menggunakan nama service 'postgres'
  #     DATABASE_URL: postgresql://postgres:password123@postgres:5432/siakng_lite?schema=public
  #     # (Opsional) Tambahkan variabel .env lain yang dibutuhkan backend Anda di sini, misalnya JWT_SECRET
  #   networks:
  #     - siakng_network

volumes:
  pgdata:

networks:
  siakng_network:
    driver: bridge
