version: '3.8'

services:
  # Konfigurasi Database PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: siakng_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-siakng_lite}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - siakng_network

  # Konfigurasi Backend NestJS
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: siakng_backend
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     - postgres
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL_DOCKER}
  #     JWT_SECRET: ${JWT_SECRET}
  #   networks:
  #     - siakng_network

volumes:
  pgdata:

networks:
  siakng_network:
    driver: bridge
